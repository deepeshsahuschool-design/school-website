<div class="notice-board-page py-5 bg-light min-vh-100">
  <div class="container py-4">
    <div class="text-center mb-5">
      <h6 class="text-secondary fw-bold text-uppercase ls-1">Stay Updated</h6>
      <h1 class="display-4 fw-bold text-primary">Official Notice Board</h1>
      <p class="lead text-muted">Latest announcements, events, and important updates for parents and students.</p>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- No Notices State -->
    <div *ngIf="!loading && notifications.length === 0" class="text-center py-5">
      <div class="card border-0 shadow-sm p-5 rounded-4">
        <i class="bi bi-megaphone display-1 text-muted mb-3"></i>
        <h3 class="text-muted">No active notices at the moment.</h3>
        <p class="text-muted">Please check back later for updates.</p>
      </div>
    </div>

    <!-- Notices List -->
    <div *ngIf="!loading && notifications.length > 0" class="row g-4">
      <div class="col-lg-10 mx-auto" *ngFor="let notice of notifications">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-4 notice-card h-100">
          <div class="card-body p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <span class="badge bg-warning text-dark px-3 py-2 rounded-pill fw-bold">
                <i class="bi bi-calendar3 me-1"></i> {{ notice.date }}
              </span>
              <div class="text-primary fs-4">
                <i class="bi bi-pin-angle-fill"></i>
              </div>
            </div>
            
            <h2 class="card-title fw-bold mb-3">
              {{ notice.title }}
              <span *ngIf="isNew(notice.date)" class="badge bg-danger ms-2 badge-new" style="font-size: 0.7rem; vertical-align: middle;">NEW</span>
            </h2>
            <div class="card-text mb-4" [innerHTML]="notice.content"></div>
            
            <div *ngIf="notice.attachmentUrl" class="mt-3">
              <!-- If PDF - Direct Download using Cloudinary transformation -->
              <a *ngIf="notice.attachmentType === 'pdf'" [href]="getDownloadUrl(notice.attachmentUrl)" download target="_self" class="btn btn-outline-primary rounded-pill px-4">
                <i class="bi bi-download me-2"></i> Download PDF
              </a>
              
              <!-- If Image - Fullscreen Preview -->
              <button *ngIf="notice.attachmentType === 'image'" (click)="previewAttachment(notice.attachmentUrl, 'image')" class="btn btn-outline-primary rounded-pill px-4">
                <i class="bi bi-image-fill me-2"></i> View Attached Image
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Image Preview Overlay (Only for Images now) -->
  <div *ngIf="selectedAttachment && selectedAttachment.type === 'image'" class="preview-overlay" (click)="closePreview()">
    <div class="preview-content container" (click)="$event.stopPropagation()">
      <button class="btn-close btn-close-white position-fixed top-0 end-0 m-4 fs-3" (click)="closePreview()"></button>
      
      <div class="preview-container h-100 d-flex align-items-center justify-content-center">
        <img [src]="selectedAttachment.url" class="img-fluid rounded-3 shadow-lg" style="max-height: 90vh;">
      </div>
    </div>
  </div>
</div>
